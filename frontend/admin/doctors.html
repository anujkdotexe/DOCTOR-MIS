<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Doctors — DocFind Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-admin-page="doctors">

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-brand">
        <div class="navbar-logo">🏥</div>
        <span class="navbar-title">Doc<span>Find</span> <span style="font-size:0.7em;color:var(--secondary);margin-left:4px">Admin</span></span>
      </a>
      <div class="navbar-auth" style="display:flex;align-items:center;gap:12px">
        <span class="navbar-user" id="admin-user-label">Admin</span>
        <button class="btn btn-sm btn-outline" onclick="logout()" style="color:#FDEBD0;border-color:#FDEBD0">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-title">Navigation</div>
    <ul class="admin-nav">
      <li><a href="index.html"><span>📊</span> Dashboard</a></li>
      <li><a href="doctors.html" class="active"><span>🩺</span> Manage Doctors</a></li>
      <li><a href="appointments.html"><span>📅</span> Appointments</a></li>
      <li><a href="../index.html"><span>🔍</span> View Site</a></li>
    </ul>
  </aside>

  <main class="admin-main">
    <div class="admin-page-title">
      <div>
        <h2>Manage Doctors</h2>
        <p>Add, edit, or remove doctors from the database.</p>
      </div>
      <button class="btn btn-primary" id="btn-add-doctor">+ Add New Doctor</button>
    </div>

    <div class="admin-table-wrap">
      <div class="admin-table-header">
        <h3>All Doctors</h3>
        <input type="text" id="search-doctors-input" placeholder="Search by name or hospital…"
               style="padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:0.88rem;width:240px;outline:none">
      </div>
      <div style="overflow-x:auto">
        <table class="admin-table">
          <thead>
            <tr><th>#</th><th>Doctor</th><th>Specialization</th><th>City</th><th>Hospital</th><th>Rating</th><th>Actions</th></tr>
          </thead>
          <tbody id="doctors-table-body">
            <tr><td colspan="7" style="text-align:center;padding:32px">Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="doctors-pagination" style="padding:16px;justify-content:center"></div>
    </div>
  </main>
</div>

<!-- ADD / EDIT DOCTOR MODAL -->
<div class="modal-overlay" id="doctor-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add New Doctor</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <form id="doctor-form" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" name="name" placeholder="Dr. Full Name" required>
        </div>
        <div class="form-group">
          <label>Specialization *</label>
          <select name="specialization" required>
            <option value="">Select…</option>
            <option>Cardiologist</option>
            <option>Dermatologist</option>
            <option>Neurologist</option>
            <option>Orthopedic Surgeon</option>
            <option>Pediatrician</option>
            <option>Gynecologist</option>
            <option>Psychiatrist</option>
            <option>General Physician</option>
            <option>ENT Specialist</option>
            <option>Ophthalmologist</option>
            <option>Oncologist</option>
            <option>Endocrinologist</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City *</label>
          <input type="text" name="city" placeholder="e.g. Mumbai" required>
        </div>
        <div class="form-group">
          <label>Hospital *</label>
          <input type="text" name="hospital" placeholder="Hospital name" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Rating (0.0–5.0)</label>
          <input type="number" name="rating" min="0" max="5" step="0.1" placeholder="4.5">
        </div>
        <div class="form-group">
          <label>Experience (years)</label>
          <input type="number" name="experience_years" min="0" max="60" placeholder="10">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone" placeholder="+91-98765-43210">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="doctor@hospital.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Available Days</label>
          <input type="text" name="available_days" placeholder="Mon-Sat">
        </div>
        <div class="form-group">
          <label>Timings</label>
          <input type="text" name="available_time" placeholder="09:00 AM - 05:00 PM">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Consultation Fee (₹, 0=Free)</label>
          <input type="number" name="consultation_fee" min="0" placeholder="500">
        </div>
        <div class="form-group">
          <label>Photo URL</label>
          <input type="url" name="photo_url" placeholder="https://…">
        </div>
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea name="bio" placeholder="Short biography…"></textarea>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px">
        <button type="submit" class="btn btn-primary" style="flex:1">Save Doctor</button>
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
